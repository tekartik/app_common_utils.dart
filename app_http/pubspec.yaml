name: tekartik_app_http
description: Http for flutter app
version: 0.2.0
publish_to: none

environment:
  sdk: ^3.12.0

dependencies:
  fs_shim: ">=2.5.2"
  tekartik_http_browser:
    git:
      url: https://github.com/tekartik/http.dart
      path: http_browser
    version: '>=0.0.1'
  tekartik_common_utils:
    git:
      url: https://github.com/tekartik/common_utils.dart
    version: '>=0.0.1'
  tekartik_http:
    git:
      url: https://github.com/tekartik/http.dart
      path: http
    version: '>=0.0.1'
  tekartik_http_io:
    git:
      url: https://github.com/tekartik/http.dart
      path: http_io
    version: '>=0.0.1'
dev_dependencies:
  http:
  dev_build: ">=1.1.8+1"
  process_run: ">=1.3.4"
  test: ">=1.31.0"
  build_web_compilers: ">=4.7.0"
resolution: workspace
